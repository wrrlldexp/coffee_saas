<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f172a">
<title>takt — Панель управления</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js" defer></script>
<link rel="stylesheet" href="/app.css">
</head>
<body>

<svg style="display:none"><symbol id="taktMark" viewBox="0 0 100 100">
  <rect x="12" y="48" width="15" height="34" rx="6" fill="currentColor"/>
  <rect x="33" y="34" width="15" height="48" rx="6" fill="currentColor"/>
  <rect x="54" y="20" width="15" height="62" rx="6" fill="#C8924A"/>
  <rect x="75" y="42" width="9" height="40" rx="4.5" fill="currentColor" opacity=".5"/>
</symbol></svg>

<a href="#main-content" class="skip-link">Перейти к контенту</a>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="Основная навигация">
    <div class="sidebar-header">
      <a class="sidebar-logo" href="#" onclick="event.preventDefault();go('dashboard')" title="На главную">
        <svg width="24" height="24" style="color:var(--sidebar-text-active)"><use href="#taktMark"/></svg>
        takt
      </a>
      <div class="sidebar-org" id="orgName">Загрузка&#8230;</div>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-page="dashboard" onclick="go('dashboard')" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Обзор
      </button>
      <button class="nav-item" data-page="shifts" onclick="go('shifts')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Смены
      </button>
      <button class="nav-item" data-page="locations" onclick="go('locations')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Точки
      </button>
      <button class="nav-item" data-page="calendar" onclick="go('calendar')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Календарь
      </button>
      <button class="nav-item" data-page="orders" onclick="go('orders')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Заказы
      </button>
      <button class="nav-item" data-page="products" onclick="go('products')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        Товары
      </button>
      <button class="nav-item" data-page="checklists" onclick="go('checklists')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Чеклисты
      </button>
      <button class="nav-item" data-page="regulations" onclick="go('regulations')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14l2 2 4-4"/></svg>
        Регламенты
      </button>
      <button class="nav-item" data-page="recipes" onclick="go('recipes')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Техкарты
      </button>

      <div class="nav-sep"></div>

      <button class="nav-item" data-page="schedule" onclick="go('schedule')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        График
      </button>
      <button class="nav-item" data-page="payroll" onclick="go('payroll')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        Зарплата
      </button>
      <button class="nav-item" data-page="team" onclick="go('team')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Команда
      </button>
      <button class="nav-item" data-page="settings" onclick="go('settings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Настройки
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-avatar" id="sidebarAvatar">...</div>
      <div class="sidebar-user-info">
        <div class="sidebar-uname" id="sidebarUser">...</div>
        <div class="sidebar-urole" id="sidebarRole">...</div>
      </div>
    </div>
  </aside>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Mobile topbar -->
  <div class="topbar" id="topbar">
    <a class="topbar-logo" href="#" onclick="event.preventDefault();go('dashboard')" title="На главную">
      <svg width="20" height="20"><use href="#taktMark"/></svg>
      takt
    </a>
    <button class="hamburger" onclick="toggleSidebar()" aria-label="Открыть меню">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>

  <!-- Content -->
  <main class="main" id="main-content">
    <div class="page active" id="pg-dashboard"></div>
    <div class="page" id="pg-shifts"></div>
    <div class="page" id="pg-locations"></div>
    <div class="page" id="pg-calendar"></div>
    <div class="page" id="pg-orders"></div>
    <div class="page" id="pg-products"></div>
    <div class="page" id="pg-checklists"></div>
    <div class="page" id="pg-regulations"></div>
    <div class="page" id="pg-recipes"></div>
    <div class="page" id="pg-schedule"></div>
    <div class="page" id="pg-payroll"></div>
    <div class="page" id="pg-team"></div>
    <div class="page" id="pg-settings"></div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()" role="dialog" aria-modal="true">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Toast -->
<div id="toast-container" role="status" aria-live="polite"></div>

<script src="/app.js"></script>
</body>
</html>
