<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f172a">
<title>takt — Панель управления</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js" defer></script>
<style>
/* ══════════════════════════════════════════
   Design tokens
   ══════════════════════════════════════════ */
:root {
  /* Palette: slate neutrals + emerald accent */
  --bg:          #f8fafc;
  --bg-subtle:   #f1f5f9;
  --surface:     #ffffff;
  --surface-raised: #ffffff;

  --border:      #e2e8f0;
  --border-subtle:#f1f5f9;

  --text:        #0f172a;
  --text-secondary:#475569;
  --text-muted:  #94a3b8;
  --text-inverse:#ffffff;

  --accent:      #059669;
  --accent-hover:#047857;
  --accent-soft: #ecfdf5;
  --accent-text: #065f46;

  --sidebar-bg:  #0f172a;
  --sidebar-text:#94a3b8;
  --sidebar-text-active:#f8fafc;
  --sidebar-hover:#1e293b;
  --sidebar-active:#334155;

  --success:     #16a34a;
  --success-bg:  #dcfce7;
  --success-text:#166534;
  --warning:     #d97706;
  --warning-bg:  #fef3c7;
  --warning-text:#92400e;
  --danger:      #dc2626;
  --danger-bg:   #fef2f2;
  --danger-text: #991b1b;
  --info-bg:     #ecfdf5;
  --info-text:   #065f46;

  --radius-sm:   6px;
  --radius:      10px;
  --radius-lg:   14px;

  --shadow-sm:   0 1px 2px rgba(0,0,0,.05);
  --shadow:      0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:   0 4px 6px rgba(0,0,0,.04), 0 2px 4px rgba(0,0,0,.03);
  --shadow-lg:   0 10px 25px rgba(0,0,0,.08), 0 4px 10px rgba(0,0,0,.04);
  --shadow-overlay: 0 20px 60px rgba(0,0,0,.18), 0 4px 16px rgba(0,0,0,.08);

  --sidebar-w:   240px;
  --topbar-h:    56px;

  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

/* ══════════════════════════════════════════
   Reset & base
   ══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--bg);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Tabular nums for data */
.tabnum { font-variant-numeric: tabular-nums; }

/* Skip to content */
.skip-link {
  position: absolute;
  top: -100%;
  left: 16px;
  z-index: 999;
  padding: 8px 16px;
  background: var(--accent);
  color: var(--text-inverse);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
}
.skip-link:focus { top: 8px; }

/* Focus ring */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ══════════════════════════════════════════
   Layout
   ══════════════════════════════════════════ */
.layout { display: flex; min-height: 100dvh; }

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  position: fixed;
  top: 0; left: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  z-index: 40;
  overflow-y: auto;
  overscroll-behavior: contain;
  transition: transform 0.2s ease;
}

.sidebar-header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.sidebar-logo {
  font-size: 20px;
  font-weight: 700;
  color: var(--sidebar-text-active);
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  cursor: pointer;
  transition: opacity .15s;
}
.sidebar-logo:hover { opacity: .8; }
.sidebar-logo svg { flex-shrink: 0; }
.sidebar-org {
  margin-top: 8px;
  font-size: 12px;
  color: var(--sidebar-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
}

.sidebar-nav {
  flex: 1;
  padding: 8px 0;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 9px 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--sidebar-text);
  background: none;
  border: none;
  cursor: pointer;
  text-align: left;
  transition: color 0.15s ease, background 0.15s ease;
  touch-action: manipulation;
  min-height: 40px;
}
.nav-item:hover {
  background: var(--sidebar-hover);
  color: var(--sidebar-text-active);
}
.nav-item.active {
  background: var(--sidebar-active);
  color: var(--sidebar-text-active);
  font-weight: 600;
}
.nav-item svg {
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  opacity: 0.6;
}
.nav-item.active svg { opacity: 1; }
.nav-item:hover svg { opacity: 0.9; }

.nav-sep {
  height: 1px;
  background: rgba(255,255,255,.06);
  margin: 6px 16px;
}

.sidebar-footer {
  padding: 14px 20px;
  border-top: 1px solid rgba(255,255,255,.06);
  display: flex;
  align-items: center;
  gap: 10px;
}
.sidebar-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--sidebar-active);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--sidebar-text-active);
  flex-shrink: 0;
}
.sidebar-user-info { min-width: 0; }
.sidebar-uname {
  font-size: 13px;
  font-weight: 600;
  color: var(--sidebar-text-active);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-urole {
  font-size: 11px;
  color: var(--sidebar-text);
}

/* ── Main ── */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-width: 0;
}

/* ── Topbar (mobile) ── */
.topbar {
  display: none;
  background: var(--sidebar-bg);
  padding: 0 16px;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 30;
  height: var(--topbar-h);
}
.topbar-logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-inverse);
  letter-spacing: -0.5px;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
}
.hamburger {
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  color: var(--text-inverse);
  touch-action: manipulation;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
}
.hamburger:hover { background: rgba(255,255,255,.1); }
.hamburger svg { width: 22px; height: 22px; }

/* Mobile overlay */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 39;
}
.sidebar-overlay.open { display: block; }

/* ══════════════════════════════════════════
   Pages
   ══════════════════════════════════════════ */
.page {
  display: none;
  padding: 28px 32px;
  max-width: 1200px;
}
.page.active { display: block; }

.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 12px;
}
.page-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
}
.page-title .count {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  margin-left: 6px;
}

/* ══════════════════════════════════════════
   Cards
   ══════════════════════════════════════════ */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
}
.card-header {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 14px;
}

/* ── Stats ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.15s ease, transform 0.15s ease;
}
.stat-card:hover {
  box-shadow: var(--shadow-md);
}
.stat-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.stat-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}
.stat-value.accent { color: var(--accent); }
.stat-value.success { color: var(--success); }
.stat-value.warning { color: var(--warning); }

/* ══════════════════════════════════════════
   Buttons
   ══════════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s ease, box-shadow 0.15s ease;
  touch-action: manipulation;
  min-height: 36px;
  white-space: nowrap;
}
.btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.btn-primary {
  background: var(--accent);
  color: var(--text-inverse);
  box-shadow: 0 1px 2px rgba(5,150,105,.2);
}
.btn-primary:hover {
  background: var(--accent-hover);
  box-shadow: 0 1px 3px rgba(5,150,105,.3);
}
.btn-sm { padding: 6px 12px; font-size: 12px; min-height: 30px; }
.btn-outline {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
}
.btn-outline:hover { background: var(--bg-subtle); }
.btn-success { background: var(--success); color: var(--text-inverse); }
.btn-success:hover { background: #15803d; }
.btn-danger { background: var(--danger); color: var(--text-inverse); }
.btn-danger:hover { background: #b91c1c; }
.btn-ghost {
  background: none;
  border: none;
  color: var(--text-secondary);
  padding: 6px 10px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  border-radius: var(--radius-sm);
  transition: color 0.15s ease, background 0.15s ease;
  touch-action: manipulation;
}
.btn-ghost:hover { color: var(--text); background: var(--bg-subtle); }

/* ══════════════════════════════════════════
   Tables
   ══════════════════════════════════════════ */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  text-align: left;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-subtle);
  position: sticky;
  top: 0;
}
th:first-child { border-radius: var(--radius-lg) 0 0 0; }
th:last-child { border-radius: 0 var(--radius-lg) 0 0; }
td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-subtle);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg); }
td strong { font-weight: 600; }

/* ══════════════════════════════════════════
   Badges
   ══════════════════════════════════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 10px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}
.badge-open { background: var(--success-bg); color: var(--success-text); }
.badge-closed { background: var(--bg-subtle); color: var(--text-muted); }
.badge-warning { background: var(--warning-bg); color: var(--warning-text); }
.badge-info { background: var(--info-bg); color: var(--info-text); }

/* ══════════════════════════════════════════
   Progress bar
   ══════════════════════════════════════════ */
.progress {
  background: var(--bg-subtle);
  border-radius: 100px;
  height: 6px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 100px;
  transition: width 0.4s ease;
}
.progress-fill.green { background: var(--success); }
.progress-fill.yellow { background: var(--warning); }
.progress-fill.red { background: var(--danger); }

/* ══════════════════════════════════════════
   Checklist items
   ══════════════════════════════════════════ */
.check-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  transition: background 0.15s ease;
  cursor: pointer;
  min-height: 44px;
}
.check-item:hover { background: var(--bg); }
.check-item input[type=checkbox] {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}
.check-item .task-text {
  flex: 1;
  font-size: 13px;
  min-width: 0;
}
.check-item .task-text.done {
  text-decoration: line-through;
  color: var(--text-muted);
}
.check-item .task-by {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
}
.check-item .task-type {
  font-size: 10px;
  color: var(--text-muted);
  background: var(--bg-subtle);
  padding: 2px 8px;
  border-radius: 100px;
  white-space: nowrap;
}

/* ══════════════════════════════════════════
   Calendar items
   ══════════════════════════════════════════ */
.cal-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--accent);
  background: var(--surface);
  margin-bottom: 6px;
  transition: background 0.15s ease;
  min-height: 44px;
}
.cal-item:hover { background: var(--bg); }
.cal-item[data-color="red"]    { border-left-color: var(--danger); }
.cal-item[data-color="green"]  { border-left-color: var(--success); }
.cal-item[data-color="orange"] { border-left-color: var(--warning); }
.cal-item[data-color="blue"]   { border-left-color: #3b82f6; }
.cal-item[data-color="purple"] { border-left-color: #8b5cf6; }
.cal-item .cal-text { flex: 1; font-size: 13px; min-width: 0; }
.cal-item .cal-assigned {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* Date group header */
.date-group { margin-bottom: 20px; }
.date-group-header {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.date-group-header .today-badge {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent-text);
  background: var(--accent-soft);
  padding: 1px 8px;
  border-radius: 100px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ══════════════════════════════════════════
   Modal
   ══════════════════════════════════════════ */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,23,42,.5);
  z-index: 100;
  align-items: flex-start;
  justify-content: center;
  padding: 60px 16px;
  overflow-y: auto;
  overscroll-behavior: contain;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 24px;
  width: 100%;
  max-width: 480px;
  box-shadow: var(--shadow-overlay);
  animation: modalIn 0.2s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(8px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.modal h3 {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 16px;
  letter-spacing: -0.2px;
}
.modal .field { margin-bottom: 14px; }
.modal .field label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 5px;
}
.modal .field input,
.modal .field select,
.modal .field textarea {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: var(--font);
  font-size: 16px; /* prevent iOS zoom */
  color: var(--text);
  background: var(--surface);
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
.modal .field input:focus,
.modal .field select:focus,
.modal .field textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(5,150,105,.12);
  outline: none;
}
.modal .field textarea { resize: vertical; min-height: 80px; }
.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border-subtle);
}

/* ══════════════════════════════════════════
   Toast
   ══════════════════════════════════════════ */
#toast-container {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 200;
  display: flex;
  flex-direction: column-reverse;
  gap: 8px;
}
.toast {
  background: var(--text);
  color: var(--text-inverse);
  padding: 12px 18px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: toastIn 0.25s ease;
  max-width: 360px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.success { background: var(--success-text); }
.toast.error { background: var(--danger); }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(8px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ══════════════════════════════════════════
   Empty state
   ══════════════════════════════════════════ */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}
.empty svg { margin-bottom: 12px; opacity: 0.4; }
.empty p { font-size: 14px; }
.empty .empty-action { margin-top: 12px; }

/* ══════════════════════════════════════════
   Section: shift detail, location cards
   ══════════════════════════════════════════ */
.loc-card {
  padding: 18px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.15s ease;
}
.loc-card:hover { box-shadow: var(--shadow-md); }
.loc-card-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.loc-card-addr { font-size: 13px; color: var(--text-secondary); }
.loc-card-meta { font-size: 12px; color: var(--text-muted); margin-top: 6px; }

.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin: 18px 0 8px;
}

/* Rating stars */
.stars { color: #f59e0b; letter-spacing: 1px; }

/* ══════════════════════════════════════════
   Responsive
   ══════════════════════════════════════════ */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .topbar { display: flex; }
  .page { padding: 20px 16px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .page-title { font-size: 18px; }
  .stat-value { font-size: 22px; }
  .card { padding: 16px; }
  .modal { padding: 20px; }
  #toast-container { bottom: 12px; right: 12px; left: 12px; }
  .toast { max-width: 100%; }
}
@media (max-width: 400px) {
  .stats-grid { grid-template-columns: 1fr; }
}

/* ══════════════════════════════════════════
   Dashboard role-specific components
   ══════════════════════════════════════════ */

/* Skeleton shimmer */
@keyframes shimmer {
  0% { background-position: -400px 0; }
  100% { background-position: 400px 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--bg-subtle) 25%, var(--border) 37%, var(--bg-subtle) 63%);
  background-size: 800px 100%;
  animation: shimmer 1.8s infinite linear;
  border-radius: var(--radius-sm);
}
.skel-line { height: 14px; margin-bottom: 10px; border-radius: 4px; }
.skel-line.w60 { width: 60%; }
.skel-line.w40 { width: 40%; }
.skel-line.w80 { width: 80%; }
.skel-block { height: 120px; border-radius: var(--radius-lg); margin-bottom: 16px; }
.skel-circle { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 12px; }

/* Dashboard grid */
.dash-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
@media (min-width: 768px) {
  .dash-grid { grid-template-columns: repeat(2, 1fr); }
  .dash-grid .dash-wide { grid-column: 1 / -1; }
}
@media (min-width: 1200px) {
  .dash-grid { grid-template-columns: repeat(3, 1fr); }
}

/* Location status card */
.loc-status {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow 0.15s ease;
}
.loc-status:hover { box-shadow: var(--shadow-md); }
.loc-status-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.green { background: var(--success); box-shadow: 0 0 0 3px rgba(22,163,74,.15); }
.status-dot.red { background: var(--danger); box-shadow: 0 0 0 3px rgba(220,38,38,.15); }
.status-dot.gray { background: var(--text-muted); box-shadow: 0 0 0 3px rgba(148,163,184,.15); }
.loc-status-name { font-size: 15px; font-weight: 600; }
.loc-status-meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }

/* Staff badges */
.staff-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.staff-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  background: var(--bg-subtle);
  border-radius: 100px;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.15s ease;
  touch-action: manipulation;
  min-height: 28px;
}
.staff-badge:hover { background: var(--border); }

/* Attention block */
.attention-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--warning);
  background: var(--surface);
  margin-bottom: 6px;
  cursor: pointer;
  transition: background 0.15s ease;
  min-height: 44px;
}
.attention-item:hover { background: var(--bg); }
.attention-item.alert { border-left-color: var(--danger); }
.attention-item .att-text { flex: 1; font-size: 13px; min-width: 0; }
.attention-item .att-meta { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

/* Donut chart */
.chart-wrap {
  position: relative;
  width: 100%;
  max-width: 200px;
  margin: 0 auto;
}
.chart-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  margin-top: 12px;
}
.chart-legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: var(--text-secondary);
}
.chart-legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Photo carousel */
.photo-carousel {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 8px;
}
.photo-carousel::-webkit-scrollbar { height: 4px; }
.photo-carousel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.photo-thumb {
  flex-shrink: 0;
  width: 120px;
  height: 90px;
  border-radius: var(--radius-sm);
  background: var(--bg-subtle);
  scroll-snap-align: start;
  object-fit: cover;
  border: 1px solid var(--border);
}

/* Empty feature card */
.empty-feature {
  background: var(--bg-subtle);
  border: 1px dashed var(--border);
  border-radius: var(--radius-lg);
  padding: 24px;
  text-align: center;
}
.empty-feature svg { margin-bottom: 10px; opacity: 0.35; }
.empty-feature .ef-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
.empty-feature .ef-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; max-width: 260px; margin-left: auto; margin-right: auto; }

/* Period switcher */
.period-switch {
  display: inline-flex;
  background: var(--bg-subtle);
  border-radius: var(--radius-sm);
  padding: 2px;
  gap: 2px;
}
.period-switch button {
  padding: 5px 14px;
  border: none;
  background: none;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: 4px;
  transition: background 0.15s ease, color 0.15s ease;
  touch-action: manipulation;
  min-height: 30px;
}
.period-switch button.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

/* Sortable table header */
.sortable-th {
  cursor: pointer;
  user-select: none;
}
.sortable-th:hover { color: var(--text); }

/* Greeting */
.dash-greeting {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: 4px;
}
.dash-subgreeting {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 24px;
}

/* Barista shift card */
.shift-hero {
  background: linear-gradient(135deg, var(--sidebar-bg), #1e293b);
  color: var(--text-inverse);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 16px;
}
.shift-hero .sh-label { font-size: 12px; color: var(--sidebar-text); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.shift-hero .sh-location { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
.shift-hero .sh-date { font-size: 14px; color: var(--sidebar-text); margin-bottom: 16px; }
.shift-hero .sh-coworkers { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.shift-hero .sh-cw {
  padding: 3px 10px;
  background: rgba(255,255,255,.1);
  border-radius: 100px;
  font-size: 12px;
}

/* Digest card */
.digest-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  box-shadow: var(--shadow-sm);
}
.digest-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--border-subtle);
}
.digest-row:last-child { border-bottom: none; }
.digest-label { color: var(--text-secondary); }
.digest-value { font-weight: 600; font-variant-numeric: tabular-nums; }

/* Mini chart container */
.mini-chart { height: 180px; position: relative; }

/* Regulation tasks */
.reg-task {
  display: flex;
  align-items: center;
  justify-content: space-between;

  padding: 8px 10px;
  border-radius: 8px;

}
.reg-task:hover { background: var(--bg-subtle, #f5f5f5); }
.reg-task-done { opacity: .65; }
.reg-task-check { flex-shrink: 0; display: flex; align-items: center; }
.reg-photo-btn { transition: all .15s; }
.reg-photo-btn:active { transform: scale(.95); }
</style>
</head>

<script>
// ── State ──
let ME = null, ORG = null, ORGID = null;
let DATA = { locations: [], shifts: [], orders: [], products: [], calendar: [], checklists: [], settings: {} };

// ── API ──
async function api(method, path, body) {
  const h = { 'Content-Type': 'application/json' };
  if (ORGID) h['x-org-id'] = ORGID;
  const opts = { method, headers: h, credentials: 'include' };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (res.status === 401) { window.location.href = '/onboarding'; return null; }
  const data = await res.json().catch(() => null);
  if (!res.ok) throw new Error(data?.error?.message || data?.message || 'Ошибка');
  return data;
}

// ── Toast ──
function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Modal ──
function openModal(html) {
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalContent').innerHTML = html;
  overlay.classList.add('open');
  // Trap focus
  const firstInput = overlay.querySelector('input, select, textarea, button');
  if (firstInput) setTimeout(() => firstInput.focus(), 50);
  // ESC to close
  document.addEventListener('keydown', modalEsc);
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.removeEventListener('keydown', modalEsc);
}
function modalEsc(e) { if (e.key === 'Escape') closeModal(); }

// ── Navigation ──
function go(page) {
  // Clear dashboard polling when navigating away
  if (page !== 'dashboard' && _dashPollTimer) { clearInterval(_dashPollTimer); _dashPollTimer = null; }
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('pg-' + page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => {
    const isActive = n.dataset.page === page;
    n.classList.toggle('active', isActive);
    if (isActive) n.setAttribute('aria-current', 'page');
    else n.removeAttribute('aria-current');
  });
  closeSidebar();
  render[page]?.();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// ── Formatters ──
function fmtDate(d) {
  return new Intl.DateTimeFormat('ru', { day: 'numeric', month: 'short' }).format(new Date(d));
}
function fmtDateTime(d) {
  return new Intl.DateTimeFormat('ru', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }).format(new Date(d));
}
function locName(id) { return DATA.locations.find(l => l.id === id)?.name || '\u2014'; }
function today() { return new Date().toISOString().slice(0, 10); }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function initials(name) { return (name || '?').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase(); }

function progressClass(rate) {
  if (rate > 0.8) return 'green';
  if (rate > 0.5) return 'yellow';
  return 'red';
}

function calcCompRate(shift) {
  const comps = shift.completions || [];
  if (!comps.length) return 0;
  return comps.filter(c => c.done).length / comps.length;
}

// ── SVG icons (inline helpers) ──
const ico = {
  plus: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  check: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  empty: '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>',
};

// ══════════════════════════════════════════
// Renderers
// ══════════════════════════════════════════
const render = {};

// ── Dashboard (role-based) ──

let _dashPollTimer = null;

function greetByTime() {
  const h = new Date().getHours();
  if (h < 6) return 'Доброй ночи';
  if (h < 12) return 'Доброе утро';
  if (h < 18) return 'Добрый день';
  return 'Добрый вечер';
}

function dashEndpoint(role) {
  if (['OWNER', 'OPS_DIRECTOR'].includes(role)) return '/api/dashboard/owner';
  if (['MANAGER', 'HEAD_BARISTA'].includes(role)) return '/api/dashboard/manager';
  return '/api/dashboard/barista';
}

// ── Pluralize helper ──
function pluralize(n, one, few, many) {
  const abs = Math.abs(n) % 100;
  const last = abs % 10;
  if (abs > 10 && abs < 20) return many;
  if (last > 1 && last < 5) return few;
  if (last === 1) return one;
  return many;
}

// ── Dashboard dispatcher ──
render.dashboard = async () => {
  const el = document.getElementById('pg-dashboard');
  const role = ORG?.taktRole || 'BARISTA';

  // Show skeleton immediately
  el.innerHTML = dashSkeleton(role);

  // Clear previous polling
  if (_dashPollTimer) { clearInterval(_dashPollTimer); _dashPollTimer = null; }

  try {
    const resp = await api('GET', dashEndpoint(role));
    const data = resp?.data || {};

    if (['OWNER', 'OPS_DIRECTOR'].includes(role)) renderOwnerDashboard(el, data);
    else if (['MANAGER', 'HEAD_BARISTA'].includes(role)) renderManagerDashboard(el, data);
    else renderBaristaDashboard(el, data);

    // Poll every 60s
    _dashPollTimer = setInterval(async () => {
      try {
        const r = await api('GET', dashEndpoint(role));
        const d = r?.data || {};
        if (['OWNER', 'OPS_DIRECTOR'].includes(role)) renderOwnerDashboard(el, d);
        else if (['MANAGER', 'HEAD_BARISTA'].includes(role)) renderManagerDashboard(el, d);
        else renderBaristaDashboard(el, d);
      } catch (_) { /* silent poll failure */ }
    }, 60000);
  } catch (err) {

// Build a map of taskKey → template task info from checklist templates
function getTaskMeta(taskKey) {
  for (const tpl of (DATA.checklists || [])) {
    for (const sec of (tpl.sections || [])) {
      for (const t of (sec.tasks || [])) {
        if (t.key === taskKey) return t;
      }
    }
  }
  return null;
}

// Get all template tasks (from all checklist templates) as a flat list
function getAllTemplateTasks() {
  const tasks = [];
  for (const tpl of (DATA.checklists || [])) {
    for (const sec of (tpl.sections || [])) {
      for (const t of (sec.tasks || [])) {
        tasks.push({ ...t, section: sec.name, tplName: tpl.name, tplType: tpl.type });
      }
    }
  }
  return tasks;
}

async function viewShift(id) {
  try {
    const res = await api('GET', '/api/shifts/' + id);
    const s = res.data;
    const existingComps = s.completions || [];
    const events = s.events || [];
    const ratings = s.ratings || [];

    // Merge template tasks with existing completions
    const compMap = {};
    existingComps.forEach(c => { compMap[c.taskKey] = c; });
    const templateTasks = getAllTemplateTasks();
    const comps = [];
    const seenKeys = new Set();
    // Add template tasks in order, merging with existing completion data
    templateTasks.forEach(t => {
      seenKeys.add(t.key);
      const existing = compMap[t.key];
      comps.push(existing || { taskKey: t.key, done: false });
    });
    // Add any extra completions not in current template
    existingComps.forEach(c => {
      if (!seenKeys.has(c.taskKey)) comps.push(c);
    });

    const doneCount = comps.filter(c => c.done).length;

    openModal(`
      <h3>${s.date} &middot; ${locName(s.locationId)}</h3>
      <div style="margin-bottom:16px">
        <span class="badge ${s.status==='OPEN'?'badge-open':'badge-closed'}">${s.status==='OPEN'?'Открыта':'Закрыта'}</span>
        <span style="font-size:13px;color:var(--text-secondary);margin-left:8px">Ответственный: ${esc(s.responsibleName||'\u2014')}</span>
      </div>

      <div class="section-title">Задачи <span class="tabnum">(${doneCount}/${comps.length})</span></div>
      ${comps.map(c => {
        const meta = getTaskMeta(c.taskKey);
        if (meta && meta.type === 'photo_report') {
          const photos = (c.listData && c.listData.photos) || [];
          const minP = meta.minPhotos || 3;
          const maxP = meta.maxPhotos || 10;
          return `
            <div class="check-item" style="flex-direction:column;align-items:stretch;cursor:default">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
                <input type="checkbox" ${c.done ? 'checked' : ''} disabled style="pointer-events:none">
                <span class="task-text ${c.done?'done':''}">${esc(meta.text || c.taskKey)}</span>
                <span style="font-size:11px;color:var(--muted)">(${photos.length}/${minP}–${maxP})</span>
              </div>
              <div id="shift-photos-${c.taskKey}" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
                ${photos.map((url, i) => `
                  <div style="position:relative">
                    <img src="${esc(url)}" style="width:56px;height:56px;border-radius:6px;object-fit:cover;cursor:pointer" onclick="viewRegPhoto('${esc(url)}')">
                    ${s.status === 'OPEN' ? `<button onclick="removeShiftPhoto('${s.id}','${c.taskKey}',${i})" style="position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--danger,#e53e3e);color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>` : ''}
                  </div>
                `).join('')}
                ${s.status === 'OPEN' && photos.length < maxP ? `
                  <label style="width:56px;height:56px;border-radius:6px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:20px;transition:border-color .15s" onmouseenter="this.style.borderColor='var(--accent)'" onmouseleave="this.style.borderColor='var(--border)'">
                    +
                    <input type="file" accept="image/*" style="display:none" onchange="addShiftPhoto('${s.id}','${c.taskKey}',this)">
                  </label>
                ` : ''}
              </div>
              ${s.status === 'OPEN' && photos.length < minP ? `<div style="font-size:11px;color:var(--danger,#e53e3e)">Минимум ${minP} фото</div>` : ''}
            </div>`;
        }
        return `
        <div class="check-item" onclick="toggleTask('${s.id}','${c.taskKey}',${!c.done})">
          <input type="checkbox" ${c.done ? 'checked' : ''} onclick="event.stopPropagation();toggleTask('${s.id}','${c.taskKey}',${!c.done})" aria-label="${esc(c.taskKey)}">
          <span class="task-text ${c.done?'done':''}">${esc(meta?.text || c.taskKey)}</span>
          ${c.byName ? `<span class="task-by">${esc(c.byName)}</span>` : ''}
        </div>`;
      }).join('') || '<p style="color:var(--text-muted);font-size:13px">Нет задач</p>'}

      ${ratings.length ? `
      <div class="section-title">Оценки</div>
      ${ratings.map(r => `<div style="padding:6px 0;font-size:13px"><span class="stars">${'\u2605'.repeat(r.rating)}${'\u2606'.repeat(5-r.rating)}</span> <strong>${esc(r.userName)}</strong>${r.comment ? ': ' + esc(r.comment) : ''}</div>`).join('')}
      ` : ''}

      ${events.length ? `
      <div class="section-title">Журнал <span class="tabnum">(${events.length})</span></div>
      <div style="max-height:140px;overflow-y:auto;overscroll-behavior:contain">
      ${events.map(e => `<div style="padding:3px 0;font-size:12px;color:var(--text-secondary)">${fmtDateTime(e.at)} &middot; ${esc(e.userName||'\u2014')} &middot; ${esc(e.action)}${e.taskKey ? ' &middot; ' + esc(e.taskKey) : ''}</div>`).join('')}
      </div>` : ''}

      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal()">Закрыть</button>
        ${s.status === 'OPEN' ? `<button class="btn btn-success" onclick="closeShift('${s.id}')">Закрыть смену</button>` : ''}
      </div>
    `);
  } catch (err) { toast(err.message, 'error'); }
}

// Photo report: add photo to shift task
window.addShiftPhoto = async (shiftId, taskKey, inputEl) => {
  const file = inputEl.files[0];
  if (!file) return;
  inputEl.value = '';

  try {
    const formData = new FormData();
    formData.append('photo', file);
    const uploadRes = await fetch('/api/regulations/upload-photo', {
      method: 'POST',
      headers: { 'x-org-id': ORGID },
      body: formData,
    });
    const uploadJson = await uploadRes.json();
    if (!uploadJson.data?.url) throw new Error('Upload failed');

    // Get current completion to read existing photos
    const shiftRes = await api('GET', '/api/shifts/' + shiftId);
    const comp = (shiftRes.data.completions || []).find(c => c.taskKey === taskKey);
    const photos = (comp?.listData?.photos) || [];
    photos.push(uploadJson.data.url);

    const meta = getTaskMeta(taskKey);
    const minP = meta?.minPhotos || 3;
    const allDone = photos.length >= minP;

    await api('POST', '/api/shifts/' + shiftId + '/completions', {
      taskKey,
      done: allDone,
      listData: { photos },
    });

    toast(`Фото добавлено (${photos.length})`, 'success');
    viewShift(shiftId);
  } catch (err) {
    toast('Ошибка загрузки фото', 'error');
    console.error(err);
  }
};

window.removeShiftPhoto = async (shiftId, taskKey, index) => {
  try {
    const shiftRes = await api('GET', '/api/shifts/' + shiftId);
    const comp = (shiftRes.data.completions || []).find(c => c.taskKey === taskKey);
    const photos = [...((comp?.listData?.photos) || [])];
    photos.splice(index, 1);

    const meta = getTaskMeta(taskKey);
    const minP = meta?.minPhotos || 3;

    await api('POST', '/api/shifts/' + shiftId + '/completions', {
      taskKey,
      done: photos.length >= minP,
      listData: { photos },
    });

    toast('Фото удалено', 'success');
    viewShift(shiftId);
  } catch (err) {
    toast('Ошибка', 'error');
  }
};

window.showRegulation = async (reg, regId) => {
  const el = document.getElementById('pg-regulations');
  if (!reg && regId) {
    const res = await api('GET', '/api/regulations/' + regId);
    reg = res.data;
  }
  if (!reg) return;
  _currentRegulation = reg;

  const today = new Date().toISOString().slice(0, 10);
  const dayOfWeek = new Date().getDay();

  try {
    const logRes = await api('GET', `/api/regulations/${reg.id}/log?date=${today}`);
    _regulationLog = (logRes.data && logRes.data.completions) || {};
  } catch(e) {
    _regulationLog = {};
  }

  const sections = reg.sections || [];
  let totalTasks = 0;
  let doneTasks = 0;
  const visibleSections = sections.filter(s => {
    if (s.dayFilter && s.dayFilter.length > 0) return s.dayFilter.includes(dayOfWeek);
    return true;
  });

  visibleSections.forEach((s) => {
    const origIdx = sections.indexOf(s);
    (s.tasks || []).forEach((t, ti) => {
      totalTasks++;
      const c = _regulationLog[origIdx + '-' + ti];
      if (c && c.done && c.photo) doneTasks++;
    });
  });

  const pct = totalTasks > 0 ? Math.round(doneTasks / totalTasks * 100) : 0;
  const dayNames = ['воскресенье', 'понедельник', 'вторник', 'среда', 'четверг', 'пятница', 'суббота'];

  el.innerHTML = `
    <div class="page-header">
      <div>
        <button class="btn btn-sm" onclick="render.regulations()" style="margin-right:8px">← Назад</button>
        <h1 class="page-title" style="display:inline">${esc(reg.name)}</h1>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-size:14px;color:var(--muted)">Сегодня — ${dayNames[dayOfWeek]}, ${today}</div>
        <div style="font-size:14px;font-weight:600;color:${pct === 100 ? 'var(--green)' : 'var(--text)'}">${doneTasks}/${totalTasks} ${pct === 100 ? '✓ Готово!' : ''}</div>
      </div>
      <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${pct === 100 ? 'var(--green)' : 'var(--accent)'};border-radius:4px;transition:width .3s"></div>
      </div>
    </div>
    ${visibleSections.map(s => {
      const origIdx = sections.indexOf(s);
      return `
        <div class="card" style="margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            ${s.time ? `<span style="font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-bg,rgba(79,70,229,.08));padding:2px 8px;border-radius:4px;white-space:nowrap">${esc(s.time)}</span>` : ''}
            <span style="font-weight:600;font-size:15px">${esc(s.title)}</span>
          </div>
          ${s.note ? `<div style="font-size:12px;color:var(--muted);margin-bottom:8px;padding:6px 8px;background:var(--bg);border-radius:4px;border-left:3px solid var(--accent)">${esc(s.note)}</div>` : ''}
          <div style="display:flex;flex-direction:column;gap:6px">
            ${(s.tasks || []).map((t, ti) => {
              const key = origIdx + '-' + ti;
              const comp = _regulationLog[key];
              const isDone = comp && comp.done && comp.photo;
              return `
                <div class="reg-task ${isDone ? 'reg-task-done' : ''}" id="reg-task-${key}">
                  <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
                    <div class="reg-task-check">${isDone ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>' : '<div style="width:20px;height:20px;border:2px solid var(--border);border-radius:50%"></div>'}</div>
                    <div style="flex:1;min-width:0">
                      <div style="font-size:14px;${isDone ? 'text-decoration:line-through;color:var(--muted)' : ''}">${esc(t.name)}</div>
                      ${t.note ? `<div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(t.note)}</div>` : ''}
                    </div>
                  </div>
                  <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
                    ${isDone ? `
                      <img src="${esc(comp.photo)}" onclick="viewRegPhoto('${esc(comp.photo)}')" style="width:40px;height:40px;border-radius:6px;object-fit:cover;cursor:pointer;border:2px solid var(--green)">
                      <button class="btn btn-sm" onclick="undoRegTask('${reg.id}','${key}')" style="font-size:11px;padding:4px 8px;color:var(--muted)" title="Отменить">✕</button>
                    ` : `
                      <button class="btn btn-sm reg-photo-btn" onclick="captureRegPhoto('${reg.id}','${key}')" style="display:flex;align-items:center;gap:4px;font-size:12px;padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:6px">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                        Фото
                      </button>
                    `}
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>`;
    }).join('')}
    <input type="file" id="reg-photo-input" accept="image/*" capture="environment" style="display:none">
  `;
};

// Camera capture for regulation task
window._regPhotoTarget = null;
window.captureRegPhoto = (regId, key) => {
  window._regPhotoTarget = { regId, key };
  const input = document.getElementById('reg-photo-input');
  input.value = '';
  input.click();
};

// Listen for photo capture
document.addEventListener('change', async (e) => {
  if (e.target.id !== 'reg-photo-input' || !window._regPhotoTarget) return;
  const file = e.target.files[0];
  if (!file) return;

  const { regId, key } = window._regPhotoTarget;
  window._regPhotoTarget = null;

  // Show uploading state on the button
  const taskEl = document.getElementById('reg-task-' + key);
  const btn = taskEl?.querySelector('.reg-photo-btn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span style="font-size:12px">Загрузка...</span>';
  }

  try {
    // Upload photo
    const formData = new FormData();
    formData.append('photo', file);
    const uploadRes = await fetch('/api/regulations/upload-photo', {
      method: 'POST',
      headers: { 'x-org-id': ORGID },
      body: formData,
    });
    const uploadJson = await uploadRes.json();
    if (!uploadJson.data?.url) throw new Error('Upload failed');

    // Save completion with photo
    _regulationLog[key] = {
      done: true,
      photo: uploadJson.data.url,
      at: new Date().toISOString(),
    };

    const today = new Date().toISOString().slice(0, 10);
    await api('POST', `/api/regulations/${regId}/log`, {
      date: today,
      completions: _regulationLog,
    });

    showRegulation(_currentRegulation);
  } catch (err) {
    console.error('Photo upload failed:', err);
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Фото`;
    }
    toast('Ошибка загрузки фото', 'error');
  }
});

window.undoRegTask = async (regId, key) => {
  delete _regulationLog[key];
  const today = new Date().toISOString().slice(0, 10);
  try {
    await api('POST', `/api/regulations/${regId}/log`, {
      date: today,
      completions: _regulationLog,
    });
  } catch(e) {
    console.error('Failed to undo regulation task:', e);
  }
  showRegulation(_currentRegulation);
};

window.addStepRow = () => {
  const container = document.getElementById('recSteps');
  const idx = container.children.length + 1;
  const row = document.createElement('div');
  row.className = 'rec-step-row';
  row.style.cssText = 'display:flex;gap:8px;margin-top:6px;align-items:center';

window.reindexSteps = () => {
  document.querySelectorAll('#recSteps .rec-step-row').forEach((row, i) => {
    row.querySelector('span').textContent = (i + 1) + '.';
  });
};

window.submitRecipe = async (editId) => {
  const name = document.getElementById('recName').value.trim();
  if (!name) return;

  // Collect ingredients
  const ingredients = [];
  document.querySelectorAll('#recIngredients .rec-ingr-row').forEach(row => {
    const inputs = row.querySelectorAll('input');
    const iName = inputs[0]?.value.trim();
    const iAmount = parseFloat(inputs[1]?.value) || 0;
    const iUnit = inputs[2]?.value.trim();
    if (iName) ingredients.push({ name: iName, amount: iAmount, unit: iUnit || '' });
  });

  // Collect steps
  const steps = [];
  document.querySelectorAll('#recSteps .rec-step-row').forEach(row => {
    const val = row.querySelector('input')?.value.trim();
    if (val) steps.push(val);
  });

  const body = {
    name,
    group: document.getElementById('recGroup').value.trim() || null,
    description: document.getElementById('recDesc').value.trim() || null,
    output: parseFloat(document.getElementById('recOutput').value) || 1,
    outputUnit: document.getElementById('recUnit').value.trim() || 'шт',
    costPrice: parseFloat(document.getElementById('recCost').value) || null,
    photo: document.getElementById('recPhoto').value.trim() || null,
    ingredients: ingredients.length ? ingredients : null,
    steps: steps.length ? steps : null,
  };

  // Add isActive for edit
  const activeEl = document.getElementById('recActive');
  if (activeEl) body.isActive = activeEl.checked;

  try {
    if (editId) {
      await api('PUT', '/api/recipes/' + editId, body);
    } else {
      await api('POST', '/api/recipes', body);
    }
    document.querySelector('.modal-overlay')?.remove();
    if (editId) {
      showRecipeDetail(editId);
    } else {
      render.recipes();
    }
  } catch (err) {
    alert(err.message);
  }
};

window.deleteRecipe = async (id) => {
  if (!confirm('Удалить эту техкарту?')) return;
  try {
    await api('DELETE', '/api/recipes/' + id);
    render.recipes();
  } catch (err) {
    alert(err.message);
  }
};

    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    const from = monday.toISOString().slice(0, 10);
    const to = sunday.toISOString().slice(0, 10);

    const [slotsResp, membersResp] = await Promise.all([
      api('GET', `/api/schedule?from=${from}&to=${to}`),

    const days = [];
    for (let i = 0; i < 7; i++) {

      </div>

      ${Object.keys(userSlots).length > 0 ? `
      <div class="card" style="padding:0;overflow:hidden">
        <div class="table-wrap"><table>

          </tr></thead>
          <tbody>
          ${Object.entries(userSlots).map(([uid, u]) => `<tr>
            <td style="font-weight:600;font-size:13px">${esc(u.name)}</td>
            ${days.map(d => {
              const s = u.slots[d];
              if (s) {
                return `<td style="text-align:center;${d === todayStr ? 'background:var(--accent-soft)' : ''}">
                  <div style="background:var(--bg-subtle);border-radius:var(--radius-sm);padding:4px 6px;font-size:12px">
                    <div class="tabnum" style="font-weight:600">${esc(s.startTime)}–${esc(s.endTime)}</div>
                    ${s.breakMin ? `<div style="font-size:10px;color:var(--text-muted)">перерыв ${s.breakMin}м</div>` : ''}

            }).join('')}

let _scheduleWeekOffset = 0;
window.shiftScheduleWeek = (dir) => {
  _scheduleWeekOffset += dir;
  const now = new Date();
  now.setDate(now.getDate() + _scheduleWeekOffset * 7);
  const dayOfWeek = now.getDay() || 7;
  const monday = new Date(now);
  monday.setDate(now.getDate() - dayOfWeek + 1);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  // Re-render with offset
  renderScheduleWeek(monday, sunday);
};

  ]);
  DATA.locations = loc?.data || [];
  DATA.shifts = sh?.data || [];

}

// ══════════════════════════════════════════
// Init
// ══════════════════════════════════════════
async function init() {
  try {
    const me = await api('GET', '/api/me');
    if (!me) return;
    ME = me.data;

    if (!ME.memberships?.length) {
      window.location.href = '/onboarding';
      return;
    }

    ORG = ME.memberships[0];
    ORGID = ORG.orgId;

    document.getElementById('orgName').textContent = ORG.orgName;
    document.getElementById('sidebarUser').textContent = ME.name;
    document.getElementById('sidebarAvatar').textContent = initials(ME.name);
    document.getElementById('sidebarRole').textContent =
      ({ OWNER:'Владелец', OPS_DIRECTOR:'Опер. директор', HEAD_BARISTA:'Шеф-бариста', MANAGER:'Менеджер', BARISTA:'Бариста', TRAINEE:'Стажёр' })[ORG.taktRole] || ORG.taktRole;

    await reload();
    await render.dashboard();
  } catch (err) {
    console.error(err);
    document.getElementById('pg-dashboard').innerHTML = `<div class="empty"><p>Ошибка загрузки. <a href="/onboarding">Войти</a></p></div>`;
  }
}
