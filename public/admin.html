<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0f172a">
<title>takt — Бэкофис</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8fafc; --bg-subtle: #f1f5f9; --surface: #fff;
  --border: #e2e8f0; --text: #0f172a; --text-secondary: #475569; --text-muted: #94a3b8;
  --accent: #7c3aed; --accent-hover: #6d28d9; --accent-soft: #f5f3ff; --accent-text: #5b21b6;
  --sidebar-bg: #1e1b4b; --sidebar-text: #a5b4fc; --sidebar-active: #312e81; --sidebar-hover: #312e81;
  --success: #16a34a; --success-bg: #dcfce7; --danger: #dc2626; --danger-bg: #fef2f2;
  --warning: #d97706; --warning-bg: #fef3c7;
  --radius: 10px; --radius-sm: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,.04), 0 2px 4px rgba(0,0,0,.03);
  --font: 'Inter', -apple-system, system-ui, sans-serif;
  --sidebar-w: 220px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font); font-size: 14px; line-height: 1.5; color: var(--text); background: var(--bg); }
a { color: var(--accent); text-decoration: none; }

/* ── Login Screen ── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%);
}
.login-card {
  background: var(--surface); border-radius: 16px; padding: 40px; width: 380px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.login-card h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.login-card p { color: var(--text-muted); margin-bottom: 24px; }
.login-card label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: var(--text-secondary); }
.login-card input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 14px; font-family: var(--font); margin-bottom: 16px; outline: none;
  transition: border-color .15s;
}
.login-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.login-error { color: var(--danger); font-size: 13px; margin-bottom: 12px; display: none; }

/* ── App Layout ── */
#app { display: none; }
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w);
  background: var(--sidebar-bg); color: var(--sidebar-text); padding: 20px 0;
  display: flex; flex-direction: column; z-index: 100;
}
.sidebar-logo { padding: 0 20px 20px; font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -.5px; }
.sidebar-logo span { color: var(--accent); }
.sidebar nav { flex: 1; }
.sidebar nav a {
  display: flex; align-items: center; gap: 10px; padding: 10px 20px;
  color: var(--sidebar-text); font-size: 14px; font-weight: 500;
  transition: background .15s, color .15s; cursor: pointer; border: none; background: none; width: 100%; text-align: left;
}
.sidebar nav a:hover { background: var(--sidebar-hover); color: #fff; }
.sidebar nav a.active { background: var(--sidebar-active); color: #fff; }
.sidebar nav a svg { width: 18px; height: 18px; flex-shrink: 0; }
.sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.1); }
.sidebar-footer .admin-name { color: #fff; font-size: 13px; font-weight: 600; }
.sidebar-footer .admin-email { color: var(--sidebar-text); font-size: 12px; }
.sidebar-footer button {
  margin-top: 10px; background: none; border: 1px solid rgba(255,255,255,.2);
  color: var(--sidebar-text); padding: 6px 12px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 12px; font-family: var(--font);
}
.sidebar-footer button:hover { background: rgba(255,255,255,.1); color: #fff; }

.main { margin-left: var(--sidebar-w); padding: 24px 32px; min-height: 100vh; }
.page-header { margin-bottom: 24px; }
.page-header h2 { font-size: 22px; font-weight: 700; }
.page-header p { color: var(--text-muted); font-size: 14px; }

/* ── Stats Cards ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--surface); border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
}
.stat-card .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; }
.stat-card .stat-value { font-size: 28px; font-weight: 700; margin-top: 4px; }

/* ── Table ── */
.table-card {
  background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
  border: 1px solid var(--border); overflow: hidden;
}
.table-toolbar {
  padding: 16px 20px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
}
.table-toolbar input {
  flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; font-family: var(--font); outline: none;
}
.table-toolbar input:focus { border-color: var(--accent); }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 10px 16px; font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; background: var(--bg-subtle); border-bottom: 1px solid var(--border); }
td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg-subtle); }
.table-pagination { padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-muted); }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
  border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  font-family: var(--font); cursor: pointer; border: none; transition: all .15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #b91c1c; }
.btn-ghost { background: none; color: var(--text-secondary); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg-subtle); }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* ── Badges ── */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 999px;
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px;
}
.badge-owner { background: var(--accent-soft); color: var(--accent-text); }
.badge-admin { background: #dbeafe; color: #1e40af; }
.badge-member { background: var(--bg-subtle); color: var(--text-secondary); }
.badge-trial { background: var(--warning-bg); color: #92400e; }
.badge-start { background: var(--success-bg); color: #166534; }
.badge-network { background: var(--accent-soft); color: var(--accent-text); }
.badge-blocked { background: var(--danger-bg); color: #991b1b; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: var(--surface); border-radius: 12px; padding: 24px; width: 480px;
  max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.modal label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: var(--text-secondary); }
.modal input, .modal select {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 14px; font-family: var(--font); margin-bottom: 12px; outline: none;
}
.modal input:focus, .modal select:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* ── Detail Panel ── */
.detail-panel { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); padding: 24px; }
.detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.detail-field label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
.detail-field .value { font-size: 15px; margin-top: 2px; }

/* ── Loading ── */
.loading { text-align: center; padding: 40px; color: var(--text-muted); }

/* ── Empty ── */
.empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: .5; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 16px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .detail-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-card">
    <h1>takt<span style="color:var(--accent)">.</span>admin</h1>
    <p>Бэкофис платформы</p>
    <div id="login-error" class="login-error"></div>
    <label>Email</label>
    <input type="email" id="login-email" placeholder="admin@takt24.ru">
    <label>Пароль</label>
    <input type="password" id="login-password" placeholder="••••••••">
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px" onclick="doLogin()">Войти</button>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-logo">takt<span>.</span>admin</div>
    <nav>
      <a data-page="dashboard" class="active" onclick="showPage('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Дашборд
      </a>
      <a data-page="users" onclick="showPage('users')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Пользователи
      </a>
      <a data-page="orgs" onclick="showPage('orgs')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/><path d="M9 9h1"/><path d="M9 13h1"/><path d="M9 17h1"/></svg>
        Организации
      </a>
      <a data-page="sessions" onclick="showPage('sessions')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Сессии
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-name" id="admin-name"></div>
      <div class="admin-email" id="admin-email"></div>
      <button onclick="doLogout()">Выйти</button>
    </div>
  </aside>

  <div class="main">
    <!-- Dashboard -->
    <div id="page-dashboard" class="page">
      <div class="page-header"><h2>Дашборд</h2><p>Обзор платформы</p></div>
      <div class="stats-grid" id="stats-grid"></div>
    </div>

    <!-- Users -->
    <div id="page-users" class="page" style="display:none">
      <div class="page-header"><h2>Пользователи</h2><p>Все зарегистрированные пользователи</p></div>
      <div class="table-card">
        <div class="table-toolbar">
          <input type="text" id="users-search" placeholder="Поиск по имени или email..." oninput="debounce(loadUsers, 300)()">
        </div>
        <div id="users-table-wrap"></div>
        <div class="table-pagination" id="users-pagination"></div>
      </div>
    </div>

    <!-- Orgs -->
    <div id="page-orgs" class="page" style="display:none">
      <div class="page-header"><h2>Организации</h2><p>Все организации на платформе</p></div>
      <div class="table-card">
        <div class="table-toolbar">
          <input type="text" id="orgs-search" placeholder="Поиск по названию..." oninput="debounce(loadOrgs, 300)()">
        </div>
        <div id="orgs-table-wrap"></div>
        <div class="table-pagination" id="orgs-pagination"></div>
      </div>
    </div>

    <!-- Sessions -->
    <div id="page-sessions" class="page" style="display:none">
      <div class="page-header"><h2>Активные сессии</h2><p>Текущие авторизованные пользователи</p></div>
      <div class="table-card">
        <div id="sessions-table-wrap"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal container -->
<div id="modal-root"></div>

<script>
// ═══════════════════════════════════════
// State
// ═══════════════════════════════════════
let token = localStorage.getItem('admin-token');
let currentPage = 'dashboard';
let usersSkip = 0, orgsSkip = 0;
const PAGE_SIZE = 20;

// ═══════════════════════════════════════
// API
// ═══════════════════════════════════════
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
    credentials: 'include',
  };
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body) opts.body = JSON.stringify(body);

  const r = await fetch(`/api/admin${path}`, opts);
  const data = await r.json();
  if (r.status === 401) { doLogout(); throw new Error('Unauthorized'); }
  if (!r.ok) throw new Error(data?.error?.message || 'Request failed');
  return data.data;
}

// ═══════════════════════════════════════
// Auth
// ═══════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';

  try {
    const data = await (async () => {
      const r = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email, password }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d?.error?.message || 'Login failed');
      return d.data;
    })();

    token = data.token;
    localStorage.setItem('admin-token', token);
    showApp(data);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

function doLogout() {
  api('POST', '/logout').catch(() => {});
  token = null;
  localStorage.removeItem('admin-token');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

// Enter key on login
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('login-email').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-password').focus(); });

// ═══════════════════════════════════════
// App init
// ═══════════════════════════════════════
async function showApp(adminData) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('admin-name').textContent = adminData?.name || 'Admin';
  document.getElementById('admin-email').textContent = adminData?.email || '';
  showPage('dashboard');
}

async function checkAuth() {
  if (!token) return;
  try {
    const data = await api('GET', '/me');
    showApp(data);
  } catch { doLogout(); }
}

// ═══════════════════════════════════════
// Navigation
// ═══════════════════════════════════════
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById(`page-${page}`).style.display = 'block';
  document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.toggle('active', a.dataset.page === page));

  if (page === 'dashboard') loadDashboard();
  else if (page === 'users') { usersSkip = 0; loadUsers(); }
  else if (page === 'orgs') { orgsSkip = 0; loadOrgs(); }
  else if (page === 'sessions') loadSessions();
}

// ═══════════════════════════════════════
// Dashboard
// ═══════════════════════════════════════
async function loadDashboard() {
  const grid = document.getElementById('stats-grid');
  grid.innerHTML = '<div class="loading">Загрузка...</div>';
  try {
    const stats = await api('GET', '/stats');
    grid.innerHTML = `
      <div class="stat-card"><div class="stat-label">Пользователи</div><div class="stat-value">${stats.users}</div></div>
      <div class="stat-card"><div class="stat-label">Организации</div><div class="stat-value">${stats.orgs}</div></div>
      <div class="stat-card"><div class="stat-label">Участники</div><div class="stat-value">${stats.members}</div></div>
      <div class="stat-card"><div class="stat-label">Смены</div><div class="stat-value">${stats.shifts}</div></div>
      <div class="stat-card"><div class="stat-label">Заказы</div><div class="stat-value">${stats.orders}</div></div>
    `;
  } catch { grid.innerHTML = '<div class="loading">Ошибка загрузки</div>'; }
}

// ═══════════════════════════════════════
// Users
// ═══════════════════════════════════════
async function loadUsers() {
  const wrap = document.getElementById('users-table-wrap');
  const search = document.getElementById('users-search').value;
  wrap.innerHTML = '<div class="loading">Загрузка...</div>';

  try {
    const { users, total } = await api('GET', `/users?skip=${usersSkip}&take=${PAGE_SIZE}&search=${encodeURIComponent(search)}`);
    if (!users.length) {
      wrap.innerHTML = '<div class="empty">Нет пользователей</div>';
      document.getElementById('users-pagination').innerHTML = '';
      return;
    }

    wrap.innerHTML = `<table>
      <thead><tr><th>Имя</th><th>Email</th><th>Организации</th><th>Создан</th><th></th></tr></thead>
      <tbody>${users.map(u => `<tr>
        <td><strong>${esc(u.name)}</strong></td>
        <td>${esc(u.email)}</td>
        <td>${u.members.map(m => `<span class="badge badge-${m.role}">${esc(m.organization.name)} · ${m.taktRole || m.role}</span>`).join(' ') || '—'}</td>
        <td>${fmtDate(u.createdAt)}</td>
        <td>
          <button class="btn btn-ghost btn-sm" onclick="editUser('${u.id}')">Изменить</button>
          <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}', '${esc(u.name)}')">Удалить</button>
        </td>
      </tr>`).join('')}</tbody>
    </table>`;

    renderPagination('users', total, usersSkip);
  } catch { wrap.innerHTML = '<div class="loading">Ошибка загрузки</div>'; }
}

async function editUser(id) {
  const user = await api('GET', `/users/${id}`);
  showModal(`Редактировать: ${user.name}`, `
    <label>Имя</label><input id="m-name" value="${esc(user.name)}">
    <label>Email</label><input id="m-email" value="${esc(user.email)}">
    <label>Телефон</label><input id="m-phone" value="${esc(user.phone || '')}">
  `, async () => {
    await api('PATCH', `/users/${id}`, {
      name: document.getElementById('m-name').value,
      email: document.getElementById('m-email').value,
      phone: document.getElementById('m-phone').value || null,
    });
    closeModal();
    loadUsers();
  });
}

async function deleteUser(id, name) {
  if (!confirm(`Удалить пользователя «${name}»? Это удалит все его данные.`)) return;
  await api('DELETE', `/users/${id}`);
  loadUsers();
}

// ═══════════════════════════════════════
// Organizations
// ═══════════════════════════════════════
async function loadOrgs() {
  const wrap = document.getElementById('orgs-table-wrap');
  const search = document.getElementById('orgs-search').value;
  wrap.innerHTML = '<div class="loading">Загрузка...</div>';

  try {
    const { orgs, total } = await api('GET', `/orgs?skip=${orgsSkip}&take=${PAGE_SIZE}&search=${encodeURIComponent(search)}`);
    if (!orgs.length) {
      wrap.innerHTML = '<div class="empty">Нет организаций</div>';
      document.getElementById('orgs-pagination').innerHTML = '';
      return;
    }

    wrap.innerHTML = `<table>
      <thead><tr><th>Название</th><th>Slug</th><th>Тариф</th><th>Участники</th><th>Локации</th><th>Создана</th><th></th></tr></thead>
      <tbody>${orgs.map(o => `<tr>
        <td><strong>${esc(o.name)}</strong></td>
        <td><code>${esc(o.slug)}</code></td>
        <td><span class="badge badge-${(o.plan||'trial').toLowerCase()}">${o.plan || 'TRIAL'}</span></td>
        <td>${o._count.members}</td>
        <td>${o._count.locations}</td>
        <td>${fmtDate(o.createdAt)}</td>
        <td>
          <button class="btn btn-ghost btn-sm" onclick="viewOrg('${o.id}')">Подробнее</button>
          <button class="btn btn-ghost btn-sm" onclick="editOrg('${o.id}')">Изменить</button>
          <button class="btn btn-danger btn-sm" onclick="deleteOrg('${o.id}', '${esc(o.name)}')">Удалить</button>
        </td>
      </tr>`).join('')}</tbody>
    </table>`;

    renderPagination('orgs', total, orgsSkip);
  } catch { wrap.innerHTML = '<div class="loading">Ошибка загрузки</div>'; }
}

async function viewOrg(id) {
  const org = await api('GET', `/orgs/${id}`);
  const membersHtml = org.members.map(m => `
    <tr>
      <td>${esc(m.user.name)}</td>
      <td>${esc(m.user.email)}</td>
      <td><span class="badge badge-${m.role}">${m.role}</span></td>
      <td>${m.taktRole || '—'}</td>
      <td>
        <button class="btn btn-ghost btn-sm" onclick="editMember('${m.id}', '${esc(m.user.name)}', '${m.role}', '${m.taktRole || ''}')">Роль</button>
        <button class="btn btn-danger btn-sm" onclick="deleteMember('${m.id}', '${esc(m.user.name)}', '${id}')">Удалить</button>
      </td>
    </tr>
  `).join('');

  showModal(`${org.name}`, `
    <div class="detail-grid" style="margin-bottom:20px">
      <div class="detail-field"><label>Slug</label><div class="value">${esc(org.slug)}</div></div>
      <div class="detail-field"><label>Тариф</label><div class="value"><span class="badge badge-${(org.plan||'trial').toLowerCase()}">${org.plan||'TRIAL'}</span></div></div>
      <div class="detail-field"><label>Смены</label><div class="value">${org._count.shifts}</div></div>
      <div class="detail-field"><label>Заказы</label><div class="value">${org._count.orders}</div></div>
    </div>
    <h4 style="margin-bottom:8px">Участники (${org.members.length})</h4>
    <button class="btn btn-primary btn-sm" style="margin-bottom:12px" onclick="addMemberToOrg('${id}')">+ Добавить</button>
    <table style="font-size:13px">
      <thead><tr><th>Имя</th><th>Email</th><th>Роль</th><th>TaktRole</th><th></th></tr></thead>
      <tbody>${membersHtml || '<tr><td colspan="5" style="text-align:center">Нет участников</td></tr>'}</tbody>
    </table>
  `, null, '640px');
}

async function editOrg(id) {
  const org = await api('GET', `/orgs/${id}`);
  showModal(`Редактировать: ${org.name}`, `
    <label>Название</label><input id="m-name" value="${esc(org.name)}">
    <label>Slug</label><input id="m-slug" value="${esc(org.slug)}">
    <label>Тариф</label>
    <select id="m-plan">
      ${['TRIAL','START','NETWORK','BLOCKED'].map(p => `<option value="${p}" ${org.plan===p?'selected':''}>${p}</option>`).join('')}
    </select>
  `, async () => {
    await api('PATCH', `/orgs/${id}`, {
      name: document.getElementById('m-name').value,
      slug: document.getElementById('m-slug').value,
      plan: document.getElementById('m-plan').value,
    });
    closeModal();
    loadOrgs();
  });
}

async function deleteOrg(id, name) {
  if (!confirm(`Удалить организацию «${name}»?\n\nЭто удалит ВСЕ данные организации: смены, заказы, графики, рецепты и т.д.\n\nЭто действие необратимо.`)) return;
  await api('DELETE', `/orgs/${id}`);
  loadOrgs();
}

// ── Members ──
async function editMember(memberId, name, role, taktRole) {
  showModal(`Роль: ${name}`, `
    <label>Роль (better-auth)</label>
    <select id="m-role">
      ${['owner','admin','member'].map(r => `<option value="${r}" ${role===r?'selected':''}>${r}</option>`).join('')}
    </select>
    <label>TaktRole</label>
    <select id="m-taktRole">
      ${['OWNER','OPS_DIRECTOR','HEAD_BARISTA','MANAGER','BARISTA','TRAINEE'].map(r => `<option value="${r}" ${taktRole===r?'selected':''}>${r}</option>`).join('')}
    </select>
  `, async () => {
    await api('PATCH', `/members/${memberId}`, {
      role: document.getElementById('m-role').value,
      taktRole: document.getElementById('m-taktRole').value,
    });
    closeModal();
    loadOrgs();
  });
}

async function deleteMember(memberId, name, orgId) {
  if (!confirm(`Удалить ${name} из организации?`)) return;
  await api('DELETE', `/members/${memberId}`);
  viewOrg(orgId);
}

async function addMemberToOrg(orgId) {
  showModal('Добавить участника', `
    <label>User ID</label><input id="m-userId" placeholder="ID пользователя">
    <label>Роль (better-auth)</label>
    <select id="m-role"><option value="member">member</option><option value="admin">admin</option><option value="owner">owner</option></select>
    <label>TaktRole</label>
    <select id="m-taktRole"><option value="BARISTA">BARISTA</option><option value="TRAINEE">TRAINEE</option><option value="MANAGER">MANAGER</option><option value="HEAD_BARISTA">HEAD_BARISTA</option><option value="OPS_DIRECTOR">OPS_DIRECTOR</option><option value="OWNER">OWNER</option></select>
  `, async () => {
    await api('POST', '/members', {
      userId: document.getElementById('m-userId').value,
      organizationId: orgId,
      role: document.getElementById('m-role').value,
      taktRole: document.getElementById('m-taktRole').value,
    });
    closeModal();
    viewOrg(orgId);
  });
}

// ═══════════════════════════════════════
// Sessions
// ═══════════════════════════════════════
async function loadSessions() {
  const wrap = document.getElementById('sessions-table-wrap');
  wrap.innerHTML = '<div class="loading">Загрузка...</div>';
  try {
    const sessions = await api('GET', '/sessions');
    if (!sessions.length) {
      wrap.innerHTML = '<div class="empty">Нет активных сессий</div>';
      return;
    }
    wrap.innerHTML = `<table>
      <thead><tr><th>Пользователь</th><th>Email</th><th>Создана</th><th>Истекает</th><th></th></tr></thead>
      <tbody>${sessions.map(s => `<tr>
        <td>${esc(s.user?.name || '—')}</td>
        <td>${esc(s.user?.email || '—')}</td>
        <td>${fmtDate(s.createdAt)}</td>
        <td>${fmtDate(s.expiresAt)}</td>
        <td><button class="btn btn-danger btn-sm" onclick="terminateSession('${s.id}')">Завершить</button></td>
      </tr>`).join('')}</tbody>
    </table>`;
  } catch { wrap.innerHTML = '<div class="loading">Ошибка загрузки</div>'; }
}

async function terminateSession(id) {
  if (!confirm('Завершить сессию?')) return;
  await api('DELETE', `/sessions/${id}`);
  loadSessions();
}

// ═══════════════════════════════════════
// Helpers
// ═══════════════════════════════════════
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s);
  return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ' ' +
         d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}

function renderPagination(entity, total, skip) {
  const el = document.getElementById(`${entity}-pagination`);
  const from = skip + 1;
  const to = Math.min(skip + PAGE_SIZE, total);
  el.innerHTML = `
    <span>${from}–${to} из ${total}</span>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" ${skip === 0 ? 'disabled' : ''} onclick="${entity}Skip = Math.max(0, ${entity}Skip - ${PAGE_SIZE}); load${entity[0].toUpperCase() + entity.slice(1)}()">← Назад</button>
      <button class="btn btn-ghost btn-sm" ${skip + PAGE_SIZE >= total ? 'disabled' : ''} onclick="${entity}Skip += ${PAGE_SIZE}; load${entity[0].toUpperCase() + entity.slice(1)}()">Вперёд →</button>
    </div>
  `;
}

function debounce(fn, ms) {
  let t;
  return function(...a) { clearTimeout(t); t = setTimeout(() => fn.apply(this, a), ms); };
}

// ── Modal ──
function showModal(title, content, onSave, width) {
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="${width ? 'width:'+width : ''}">
        <h3>${title}</h3>
        ${content}
        ${onSave ? `<div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
          <button class="btn btn-primary" id="modal-save">Сохранить</button>
        </div>` : `<div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Закрыть</button></div>`}
      </div>
    </div>
  `;
  if (onSave) document.getElementById('modal-save').onclick = onSave;
}

function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

// ═══════════════════════════════════════
// Init
// ═══════════════════════════════════════
checkAuth();
</script>
