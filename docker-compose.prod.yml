services:
  app:
    image: takt-saas:latest
    container_name: takt-app
    restart: always
    ports:
      - "127.0.0.1:3010:3010"
    env_file: .env
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    container_name: takt-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: takt-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"

  caddy:
    image: caddy:2-alpine
    container_name: takt-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
  caddy-data:
  caddy-config:
